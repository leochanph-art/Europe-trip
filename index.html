<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Itinerary</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-10">

    <header class="bg-blue-600 text-white p-6 shadow-md rounded-b-3xl">
        <h1 class="text-3xl font-bold">Sapporo Adventure</h1>
        <p class="mt-2 text-blue-100">April 1, 2026 – April 8, 2026</p>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 mb-4">
            <h2 class="text-xl font-bold text-blue-600 border-b pb-2 mb-3">Day 1: Arrival</h2>
            
            <ul class="space-y-4">
                <li class="flex items-start">
                    <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded mr-3 mt-0.5">15:00</span>
                    <div>
                        <p class="font-medium">Land at New Chitose Airport (CTS)</p>
                        <p class="text-sm text-gray-500">Pick up rental car / train tickets</p>
                    </div>
                </li>
                <li class="flex items-start">
                    <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded mr-3 mt-0.5">17:30</span>
                    <div>
                        <p class="font-medium">Hotel Check-in</p>
                        <p class="text-sm text-gray-500">Drop off luggage and freshen up.</p>
                    </div>
                </li>
                <li class="flex items-start">
                    <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded mr-3 mt-0.5">19:00</span>
                    <div>
                        <p class="font-medium">Dinner: Genghis Khan (Mutton BBQ)</p>
                        <p class="text-sm text-gray-500">Susukino District</p>
                    </div>
                </li>
            </ul>
        </div>

        </main>

</body>
</html>
