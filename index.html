    <script>
        document.getElementById('display-title').innerText = tripData.title;
        document.getElementById('display-dates').innerText = tripData.dates;
        const tabsContainer = document.getElementById('tabs-container');
        const mainContent = document.getElementById('main-content');

        // Render Tabs (Including the new Budget Tab)
        function renderTabs() {
            let html = tripData.days.map((day, index) => `
                <button onclick="showDay(${index})" id="tab-${index}" class="px-4 py-2 rounded-full whitespace-nowrap font-semibold text-sm transition-all flex items-center space-x-2 bg-transparent text-slate-500">
                    <span class="text-lg">${day.icon}</span><span>${day.tabName}</span>
                </button>
            `).join('');
            
            // Add Budget Tab
            html += `
                <button onclick="showBudget()" id="tab-budget" class="px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm transition-all flex items-center space-x-2 bg-emerald-100 text-emerald-700 border border-emerald-200">
                    <span class="text-lg">💰</span><span>Budget</span>
                </button>
            `;
            tabsContainer.innerHTML = html;
        }

        // ==========================================
        // 💰 BUDGET TRACKER LOGIC (localStorage)
        // ==========================================
        let expenses = JSON.parse(localStorage.getItem('europeTripExpenses')) || [];

        function saveExpense(event) {
            event.preventDefault();
            const payee = document.getElementById('b-payee').value;
            const amount = document.getElementById('b-amount').value;
            const currency = document.getElementById('b-currency').value;
            const item = document.getElementById('b-item').value;

            expenses.push({ id: Date.now(), payee, amount, currency, item, date: new Date().toLocaleDateString() });
            localStorage.setItem('europeTripExpenses', JSON.stringify(expenses));
            
            showBudget(); // Refresh UI
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('europeTripExpenses', JSON.stringify(expenses));
            showBudget();
        }

        function showBudget() {
            // Update Active Tab Styling
            tripData.days.forEach((_, idx) => { document.getElementById(`tab-${idx}`).className = "px-4 py-2 rounded-full whitespace-nowrap font-semibold text-sm transition-all flex items-center space-x-2 bg-transparent text-slate-500"; });
            document.getElementById('tab-budget').className = "px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm transition-all flex items-center space-x-2 bg-emerald-600 text-white shadow-md";

            // Generate Table Rows
            let tableHTML = expenses.map(e => `
                <tr class="border-b border-slate-100 last:border-0">
                    <td class="py-3 px-2 text-sm font-bold text-slate-800">${e.item}</td>
                    <td class="py-3 px-2 text-xs text-slate-500">${e.payee}</td>
                    <td class="py-3 px-2 text-sm font-bold text-emerald-600 text-right">${e.amount} ${e.currency}</td>
                    <td class="py-3 pl-2 text-right"><button onclick="deleteExpense(${e.id})" class="text-red-400 text-xs">✖</button></td>
                </tr>
            `).join('');

            if(expenses.length === 0) tableHTML = `<tr><td colspan="4" class="text-center py-6 text-slate-400 text-sm">No expenses recorded yet!</td></tr>`;

            mainContent.innerHTML = `
                <div class="fade-slide-up">
                    <div class="mb-5 px-2">
                        <h2 class="text-2xl font-extrabold text-slate-900">Trip Ledger</h2>
                        <p class="text-slate-500 font-medium text-sm mt-1">Track your spending offline.</p>
                    </div>

                    <form onSubmit="saveExpense(event)" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 mb-6">
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Who Paid?</label>
                                <select id="b-payee" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1">
                                    <option>Me</option>
                                    <option>Wife</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Currency</label>
                                <select id="b-currency" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1">
                                    <option>GBP (£)</option>
                                    <option>EUR (€)</option>
                                    <option>CZK (Kč)</option>
                                    <option>HKD ($)</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-3 mb-4">
                            <div class="col-span-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Amount</label>
                                <input type="number" step="0.01" id="b-amount" required placeholder="0.00" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1">
                            </div>
                            <div class="col-span-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">For What?</label>
                                <input type="text" id="b-item" required placeholder="e.g. Dinner, Train" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1">
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition shadow-sm">Add Expense 💰</button>
                    </form>

                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="py-2 px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wide rounded-l-lg">Item</th>
                                    <th class="py-2 px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wide">Paid By</th>
                                    <th class="py-2 px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wide text-right">Amount</th>
                                    <th class="py-2 pl-2 rounded-r-lg"></th>
                                </tr>
                            </thead>
                            <tbody>${tableHTML}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 🗺️ ITINERARY DISPLAY LOGIC
        // ==========================================
        async function loadWeather(dayIndex, dateCode, coords) {
            const widget = document.getElementById(`weather-widget`);
            if (!coords || !dateCode || !widget) return;
            const diffDays = Math.ceil((new Date(dateCode) - new Date()) / 86400000);
            if (diffDays > 14) { widget.innerHTML = `<div class="bg-slate-100 text-slate-500 text-[10px] font-bold px-3 py-1.5 rounded-full shadow-sm">📅 In ${diffDays} days</div>`; return; }
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&start_date=${dateCode}&end_date=${dateCode}`);
                const data = await res.json();
                if (data.daily && data.daily.time.length > 0) {
                    widget.innerHTML = `<div class="bg-sky-100 text-sky-800 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">${Math.round(data.daily.temperature_2m_min[0])}° – ${Math.round(data.daily.temperature_2m_max[0])}°</div>`;
                }
            } catch (e) { widget.innerHTML = ``; }
        }

        function showDay(dayIndex) {
            document.getElementById('tab-budget').className = "px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm transition-all flex items-center space-x-2 bg-emerald-100 text-emerald-700 border border-emerald-200";
            tripData.days.forEach((_, idx) => {
                const tab = document.getElementById(`tab-${idx}`);
                if (idx === dayIndex) { tab.className = "px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm transition-all flex items-center space-x-2 bg-slate-900 text-white shadow-md"; } 
                else { tab.className = "px-4 py-2 rounded-full whitespace-nowrap font-semibold text-sm transition-all flex items-center space-x-2 bg-transparent text-slate-500 hover:bg-slate-200"; }
            });

            const day = tripData.days[dayIndex];
            const isSameHotel = day.acc.outName === day.acc.inName;
            
            mainContent.innerHTML = `
                <div class="fade-slide-up">
                    <div class="mb-5 px-2 flex justify-between items-end">
                        <div>
                            <h2 class="text-2xl font-extrabold text-slate-900">${day.dateText}</h2>
                            <p class="text-slate-500 font-medium text-sm mt-1">${day.icon} ${day.country}</p>
                        </div>
                        <div id="weather-widget"></div> 
                    </div>

                    <div class="bg-white border border-blue-100 rounded-2xl p-4 mb-8 shadow-sm">
                        ${isSameHotel 
                            ? `<div class="flex items-center gap-3"><span class="text-blue-500 font-bold text-[10px] uppercase w-16 text-right">Stay</span><a href="${day.acc.inLink}" target="_blank" class="font-bold text-slate-800 hover:text-blue-600 truncate">${day.acc.inName}</a></div>`
                            : `<div class="flex flex-col gap-2.5"><div class="flex items-center gap-3"><span class="text-slate-400 font-bold text-[10px] uppercase w-16 text-right">Check Out</span><a href="${day.acc.outLink}" target="_blank" class="font-bold text-slate-600 hover:text-blue-600 truncate">${day.acc.outName}</a></div><div class="w-full h-px bg-blue-100"></div><div class="flex items-center gap-3"><span class="text-blue-600 font-bold text-[10px] uppercase w-16 text-right">Check In</span><a href="${day.acc.inLink}" target="_blank" class="font-bold text-blue-900 hover:text-blue-600 truncate">${day.acc.inName}</a></div></div>`
                        }
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 px-5 py-8">
                        <ul class="relative border-l-2 border-slate-100 ml-2 space-y-10">
                            ${day.events.map(event => `
                                <li class="relative pl-6">
                                    <div class="absolute left-[-29px] top-1.5 w-3 h-3 rounded-full border-2 border-white shadow-sm box-content ${event.isFood ? 'bg-orange-400 ring-orange-50' : 'bg-slate-900 ring-slate-100'} z-10"></div>
                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                        <span class="inline-block px-2.5 py-1 ${event.isFood ? 'bg-orange-50 text-orange-700' : 'bg-slate-100 text-slate-700'} text-xs font-bold rounded shadow-sm">${event.time}</span>
                                        ${event.commute ? `<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wide bg-slate-50 border border-slate-200 px-2 py-1 rounded">${event.commute}</span>` : ''}
                                        ${event.transitNo ? `<span class="text-[10px] font-bold text-blue-700 bg-blue-50 border border-blue-200 px-2 py-1 rounded uppercase tracking-wide">${event.transitNo}</span>` : ''}
                                    </div>
                                    <div class="mt-2">
                                        ${event.mapLink ? `<a href="${event.mapLink}" target="_blank" class="font-bold ${event.isFood ? 'text-orange-900 hover:text-orange-600' : 'text-slate-900 hover:text-blue-600'} text-lg leading-tight flex items-center gap-1.5">${event.title} ↗</a>` : `<p class="font-bold ${event.isFood ? 'text-orange-900' : 'text-slate-900'} text-lg leading-tight">${event.title}</p>`}
                                        <p class="text-sm text-slate-500 mt-1.5 font-medium leading-relaxed">${event.desc}</p>
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;
            loadWeather(dayIndex, day.dateCode, day.coords);
        }

        renderTabs();
        showDay(0); // Start on Day 1
    </script>
</body>
</html>
