    <script>
        document.getElementById('display-title').innerText = tripData.title;
        document.getElementById('display-dates').innerText = tripData.dates;
        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('itinerary-content');
        
        let currentDayIndex = 0;

        // ==========================================
        // ✋ SWIPE GESTURE LOGIC
        // ==========================================
        let touchstartX = 0;
        let touchstartY = 0;
        let touchendX = 0;
        let touchendY = 0;

        contentContainer.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
            touchstartY = e.changedTouches[0].screenY;
        }, {passive: true});

        contentContainer.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            touchendY = e.changedTouches[0].screenY;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const diffX = touchendX - touchstartX;
            const diffY = touchendY - touchstartY;
            
            // Trigger if horizontal swipe is > 150px and larger than vertical swipe
            if (Math.abs(diffX) > 150 && Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX < 0 && currentDayIndex < tripData.days.length - 1) {
                    showDay(currentDayIndex + 1, 'swipe-next'); // Swipe Left -> Next
                } else if (diffX > 0 && currentDayIndex > 0) {
                    showDay(currentDayIndex - 1, 'swipe-prev'); // Swipe Right -> Prev
                }
            }
        }

        // ==========================================
        // ⛅ WEATHER LOGIC
        // ==========================================
        async function loadWeather(dayIndex, dateCode, coords) {
            const widget = document.getElementById(`weather-widget`);
            if (!coords || !dateCode || !widget) return;
            const diffDays = Math.ceil((new Date(dateCode) - new Date()) / 86400000);
            if (diffDays > 14) { widget.innerHTML = `<div class="bg-slate-100 text-slate-500 text-[10px] font-bold px-3 py-1.5 rounded-full shadow-sm">📅 In ${diffDays} days</div>`; return; }
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&start_date=${dateCode}&end_date=${dateCode}`);
                const data = await res.json();
                if (data.daily && data.daily.time.length > 0) {
                    widget.innerHTML = `<div class="bg-sky-100 text-sky-800 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">${Math.round(data.daily.temperature_2m_min[0])}° – ${Math.round(data.daily.temperature_2m_max[0])}°</div>`;
                }
            } catch (e) { widget.innerHTML = ``; }
        }

        // ==========================================
        // 🎨 RENDER LOGIC
        // ==========================================
        function renderTabs() {
            tabsContainer.innerHTML = tripData.days.map((day, index) => `
                <button onclick="showDay(${index}, 'fade-slide-up')" id="tab-${index}" class="px-4 py-2 rounded-full whitespace-nowrap font-semibold text-sm transition-all flex items-center space-x-2 bg-transparent text-slate-500 hover:bg-slate-100">
                    <span class="text-lg">${day.icon}</span><span>${day.tabName}</span>
                </button>
            `).join('');
        }

        function showDay(dayIndex, animationClass = 'fade-slide-up') {
            currentDayIndex = dayIndex;
            
            // Update Active Tab Styles
            tripData.days.forEach((_, idx) => {
                const tab = document.getElementById(`tab-${idx}`);
                if (idx === dayIndex) { tab.className = "px-4 py-2 rounded-full whitespace-nowrap font-bold text-sm transition-all flex items-center space-x-2 bg-slate-900 text-white shadow-md"; } 
                else { tab.className = "px-4 py-2 rounded-full whitespace-nowrap font-semibold text-sm transition-all flex items-center space-x-2 bg-transparent text-slate-500 hover:bg-slate-100"; }
            });

            const day = tripData.days[dayIndex];
            const isSameHotel = day.acc.outName === day.acc.inName;
            
            contentContainer.innerHTML = `
                <div class="${animationClass}">
                    <div class="mb-5 px-2 flex justify-between items-end">
                        <div>
                            <h2 class="text-2xl font-extrabold text-slate-900">${day.dateText}</h2>
                            <p class="text-slate-500 font-medium text-sm mt-1">${day.icon} ${day.country}</p>
                        </div>
                        <div id="weather-widget"></div> 
                    </div>

                    <div class="bg-white border border-blue-100 rounded-2xl p-4 mb-8 shadow-sm">
                        ${isSameHotel 
                            ? `<div class="flex items-center gap-3"><span class="text-blue-500 font-bold text-[10px] uppercase w-16 text-right tracking-widest">Stay</span><a href="${day.acc.inLink}" target="_blank" class="font-bold text-slate-800 hover:text-blue-600 truncate">${day.acc.inName}</a></div>`
                            : `<div class="flex flex-col gap-2.5"><div class="flex items-center gap-3"><span class="text-slate-400 font-bold text-[10px] uppercase w-16 text-right tracking-widest">Check Out</span><a href="${day.acc.outLink}" target="_blank" class="font-bold text-slate-600 hover:text-blue-600 truncate">${day.acc.outName}</a></div><div class="w-full h-px bg-blue-100"></div><div class="flex items-center gap-3"><span class="text-blue-600 font-bold text-[10px] uppercase w-16 text-right tracking-widest">Check In</span><a href="${day.acc.inLink}" target="_blank" class="font-bold text-blue-900 hover:text-blue-600 truncate">${day.acc.inName}</a></div></div>`
                        }
                    </div>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 px-5 py-8">
                        <ul class="relative border-l-2 border-slate-100 ml-2 space-y-10">
                            ${day.events.map(event => `
                                <li class="relative pl-6">
                                    <div class="absolute left-[-29px] top-1.5 w-3 h-3 rounded-full border-2 border-white shadow-sm box-content ${event.isFood ? 'bg-orange-400 ring-4 ring-orange-50' : 'bg-slate-900 ring-2 ring-slate-100'} z-10"></div>
                                    <div class="flex flex-wrap items-center gap-2 mb-2">
                                        <span class="inline-block px-2.5 py-1 ${event.isFood ? 'bg-orange-50 text-orange-700' : 'bg-slate-100 text-slate-700'} text-xs font-bold rounded shadow-sm">${event.time}</span>
                                        ${event.commute ? `<span class="text-[10px] font-bold text-slate-500 uppercase tracking-wide bg-slate-50 border border-slate-200 px-2 py-1 rounded">${event.commute}</span>` : ''}
                                        ${event.transitNo ? `<span class="text-[10px] font-bold text-blue-700 bg-blue-50 border border-blue-200 px-2 py-1 rounded uppercase tracking-wide">${event.transitNo}</span>` : ''}
                                    </div>
                                    <div class="mt-2">
                                        ${event.mapLink ? `<a href="${event.mapLink}" target="_blank" class="font-bold ${event.isFood ? 'text-orange-900 hover:text-orange-600' : 'text-slate-900 hover:text-blue-600'} text-lg leading-tight flex items-center gap-1.5">${event.title} ↗</a>` : `<p class="font-bold ${event.isFood ? 'text-orange-900' : 'text-slate-900'} text-lg leading-tight">${event.title}</p>`}
                                        <p class="text-sm text-slate-500 mt-1.5 font-medium leading-relaxed">${event.desc}</p>
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `;
            
            // Scroll Tabs automatically
            document.getElementById(`tab-${dayIndex}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            
            loadWeather(dayIndex, day.dateCode, day.coords);
        }

        renderTabs();

        // Initialize App & Progress
        const totalDays = tripData.days.length;
        const startDate = new Date("2026-05-06");
        const today = new Date();
        const differenceInDays = Math.floor((today.getTime() - startDate.getTime()) / (1000 * 3600 * 24));
        
        let progressPercent = 0;
        let dayToShow = 0;

        if (differenceInDays >= 0 && differenceInDays < totalDays) {
            progressPercent = Math.round(((differenceInDays + 1) / totalDays) * 100);
            dayToShow = differenceInDays;
        } else if (today.getTime() > startDate.getTime()) {
            progressPercent = 100;
            dayToShow = totalDays - 1;
        }

        setTimeout(() => {
            const circle = document.getElementById('progress-circle');
            const circumference = 2 * Math.PI * 18; // r=18
            circle.style.strokeDashoffset = circumference - (progressPercent / 100) * circumference;
            document.getElementById('progress-text').innerText = progressPercent + '%';
        }, 100);

        showDay(dayToShow);
    </script>
</body>
</html>
