<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Summer Europe Adventure!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        
        .fade-in-slide { animation: fadeInSlide 0.4s ease-out; }
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .summer-header { background: linear-gradient(135deg, #00B4D8 0%, #FFB703 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Emoji animation for active tab */
        .event-emoji { opacity: 0.6; transition: 0.3s; transform: scale(1); filter: grayscale(100%); }
        .active-event .event-emoji { opacity: 1; transform: scale(1.2); filter: grayscale(0%); }
    </style>
</head>
<body class="bg-sky-50 text-gray-800 h-screen flex flex-col">

    <script>
        // =========================================================================
        // 🛑 EASY EDIT SECTION
        // To add a map, paste the link inside mapLink: "YOUR_LINK_HERE"
        // If you don't need a map for that event, just leave mapLink out completely!
        // =========================================================================

                   {
                    tabName: "May 6", dateText: "May 6: HK to UK Transit", country: "In Transit", icon: "✈️",
                    events: [
                        { time: "Night", title: "Flight CX251", desc: "Late night departure from HKG. Your long journey to the UK begins!", mapLink: "https://www.google.com/maps/search/?api=1&query=Hong+Kong+International+Airport" }
                    ]
                },

                        { time: "07:15", title: "Paddington Station", desc: "Walk to station, grab a coffee and breakfast.", mapLink: "https://www.google.com/maps/search/?api=1&query=Paddington+Station+London" },

                        { time: "15:30", title: "漫步回程", desc: "沿著古老街道慢慢走回牛津車站。", mapLink: "https://www.google.com/maps/search/?api=1&query=Oxford+Station+UK" },

                        { time: "17:25", title: "Arrive at Paddington", desc: "Head back to the hotel.", mapLink: "https://www.google.com/maps/search/?api=1&query=Paddington+Station+London" },

                    events: [

                        { time: "11:45", title: "St James's Park", desc: "Frame shots across the central lake, capturing pelicans with the London Eye in the background.", mapLink: "https://www.google.com/maps/search/?api=1&query=St+James%27s+Park+London" },
                        { time: "13:00", title: "Big Ben & Parliament Square", desc: "Walk onto Westminster Bridge for the classic wide shot of the River Thames and Houses of Parliament.", mapLink: "https://www.google.com/maps/search/?api=1&query=Big+Ben+London" },
                        { time: "14:00", title: "Covent Garden & Lunch", desc: "Enjoy lunch at an outdoor café. Endless opportunities for dynamic street photography.", mapLink: "https://www.google.com/maps/search/?api=1&query=Covent+Garden+London" },
                        { time: "15:30", title: "Hyde Park & Italian Gardens", desc: "Walk to the Italian Gardens. The fountains offer a great contrast to upcoming alpine hikes.", mapLink: "https://www.google.com/maps/search/?api=1&query=Italian+Gardens+Hyde+Park+London" },
                        { time: "17:00", title: "Luggage Retrieval", desc: "Head back to Hub London Marylebone. Freshen up and retrieve heavy luggage.", mapLink: "https://www.google.com/maps/search/?api=1&query=Hub+by+Premier+Inn+London+Marylebone" },
                        { time: "18:00", title: "Transit to London Euston", desc: "Take the Tube or a black cab. Buy snacks for the train ride.", mapLink: "https://www.google.com/maps/search/?api=1&query=Euston+Station+London" },

                        { time: "22:00", title: "Arrival in Liverpool", desc: "Arrive at Lime Street Station. Short taxi to the hotel to rest before matchday!", mapLink: "https://www.google.com/maps/search/?api=1&query=Aparthotel+Adagio+Liverpool+City+Centre" }
                    ]

                        { time: "09:00", title: "Morning at Royal Albert Dock", desc: "Start the day with breakfast and some waterfront photography at the historic red-brick docks.", mapLink: "https://www.google.com/maps/search/?api=1&query=Royal+Albert+Dock+Liverpool" },
                        { time: "11:30", title: "Head to Anfield", desc: "Travel to the stadium early. Soak in the electric pre-match atmosphere and grab a pint at a local pub near the ground.", mapLink: "https://www.google.com/maps/search/?api=1&query=Anfield+Stadium+Liverpool" },

                {
                    tabName: "May 10", dateText: "May 10: Hello, Prague!", country: "UK / CZ", icon: "✈️",
                    events: [
                        { time: "Morn", title: "Transit to MAN", desc: "Morning transit to Manchester Airport.", mapLink: "https://www.google.com/maps/search/?api=1&query=Manchester+Airport" },
                        { time: "12:00", title: "Flight to Prague", desc: "Ryanair Flight to PRG. Get ready for a massive change in architecture and vibe!", mapLink: "https://www.google.com/maps/search/?api=1&query=Vaclav+Havel+Airport+Prague" },

    <header class="summer-header text-white p-6 shadow-lg rounded-b-3xl shrink-0 text-center relative overflow-hidden">
        <div class="absolute top-4 left-4 text-4xl opacity-60">☀️</div>
        <div class="absolute top-10 right-6 text-3xl opacity-40">☁️</div>
        <h1 class="text-3xl md:text-4xl font-extrabold" id="display-title"></h1>
        <p class="mt-2 text-sky-100 font-semibold" id="display-dates"></p>
    </header>

    <nav class="flex overflow-x-auto px-4 py-6 space-x-3 no-scrollbar shrink-0 bg-sky-50" id="tabs-container"></nav>

    <main class="flex-1 overflow-y-auto px-4 pb-12" id="itinerary-content"></main>

    <script>
        document.getElementById('display-title').innerText = tripData.title;
        document.getElementById('display-dates').innerText = tripData.dates;

        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('itinerary-content');

        // Render Tabs with Native Emojis
        function renderTabs() {
            tabsContainer.innerHTML = tripData.days.map((day, index) => `
                <button onclick="showDay(${index})" 
                        id="tab-${index}"
                        class="px-5 py-3 rounded-full whitespace-nowrap font-bold text-sm shadow transition-all duration-300 transform flex items-center space-x-2 focus:outline-none bg-white text-sky-800">
                    <span class="text-xl event-emoji">${day.icon}</span>
                    <span>${day.tabName}</span>
                </button>
            `).join('');
        }

        // Show Day Content
        function showDay(dayIndex) {
            tripData.days.forEach((_, idx) => {
                const tab = document.getElementById(`tab-${idx}`);
                if (idx === dayIndex) {
                    tab.classList.replace('bg-white', 'bg-orange-500');
                    tab.classList.replace('text-sky-800', 'text-white');
                    tab.classList.add('scale-110', 'active-event');
                } else {
                    tab.classList.replace('bg-orange-500', 'bg-white');
                    tab.classList.replace('text-white', 'text-sky-800');
                    tab.classList.remove('scale-110', 'active-event');
                }
            });

            const day = tripData.days[dayIndex];
            
            contentContainer.innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl p-6 border-t-8 border-orange-400 fade-in-slide relative overflow-hidden">
                    <div class="absolute -top-6 -right-6 text-7xl opacity-30">🌍</div>
                    <div class="flex items-center space-x-3 border-b-2 border-sky-100 pb-4 mb-6">
                        <span class="text-4xl drop-shadow-sm">${day.icon}</span>
                        <div>
                            <h2 class="text-2xl font-extrabold text-sky-900">${day.dateText}</h2>
                            <p class="text-sky-600 font-semibold text-sm">Destinations: ${day.country}</p>
                        </div>
                    </div>
                    <ul class="space-y-6 relative">
                        <div class="absolute left-6 top-3 bottom-0 w-1 bg-sky-100 rounded-full"></div>
                        ${day.events.map(event => `
                            <li class="flex items-start relative pl-12">
                                <div class="absolute left-4 top-1 w-5 h-5 bg-orange-500 rounded-full border-4 border-white shadow z-10"></div>
                                <span class="bg-sky-600 text-white text-xs font-bold px-3 py-1 rounded w-20 text-center shrink-0 mt-0.5 shadow-sm">${event.time}</span>
                                <div class="ml-5">
                                    ${event.mapLink ? 
                                      `<a href="${event.mapLink}" target="_blank" class="font-extrabold text-sky-900 text-lg leading-tight hover:text-orange-500 underline decoration-orange-300 underline-offset-4 flex items-center gap-1">${event.title} <span class="text-sm">📍</span></a>` : 
                                      `<p class="font-extrabold text-sky-900 text-lg leading-tight">${event.title}</p>`
                                    }
                                    <p class="text-sm text-sky-700 mt-1 font-medium">${event.desc}</p>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        renderTabs();

        // Smart Feature: Auto-show current day
        const startDate = new Date("2026-05-06");
        const today = new Date();
        const differenceInDays = Math.floor((today.getTime() - startDate.getTime()) / (1000 * 3600 * 24));

        if (differenceInDays >= 0 && differenceInDays < tripData.days.length) {
            showDay(differenceInDays);
            setTimeout(() => document.getElementById(`tab-${differenceInDays}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 100);
        } else if (today.getTime() > startDate.getTime()) {
            showDay(tripData.days.length - 1);
            setTimeout(() => tabsContainer.scrollLeft = tabsContainer.scrollWidth, 100);
        } else {
            showDay(0);
        }
    </script>
</body>
</html>
