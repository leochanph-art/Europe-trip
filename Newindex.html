<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Summer Europe Adventure!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for a playful, summer feel */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        body { font-family: 'Poppins', sans-serif; }
        
        /* Smooth fade and slide animation when changing tabs */
        .fade-in-slide { animation: fadeInSlide 0.4s ease-out; }
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Summer Gradient for Header */
        .summer-header { background: linear-gradient(135deg, #00B4D8 0%, #FFB703 100%); }
        
        /* Hide scrollbar for the tab menu */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Icon styling */
        .event-icon { font-size: 1.5rem; filter: grayscale(100%); opacity: 0.6; transition: 0.3s; }
        .active-event .event-icon { filter: grayscale(0%); opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body class="bg-sky-50 text-gray-800 h-screen flex flex-col">

    <script>

        // =========================================================================

            days: [
                {

        // =========================================================================
        // 🛑 DO NOT TOUCH THE CODE BELOW THIS LINE 
        // =========================================================================
    </script>

    <header class="summer-header text-white p-6 shadow-lg rounded-b-3xl shrink-0 text-center relative overflow-hidden">
        <div class="absolute top-4 left-4 text-4xl opacity-60">☀️</div>
        <div class="absolute top-10 right-6 text-3xl opacity-40">☁️</div>
        <h1 class="text-3xl md:text-4xl font-extrabold" id="display-title"></h1>
        <p class="mt-2 text-sky-100 font-semibold" id="display-dates"></p>
    </header>

    <nav class="flex overflow-x-auto px-4 py-6 space-x-3 no-scrollbar shrink-0 bg-sky-50" id="tabs-container">
        </nav>

    <main class="flex-1 overflow-y-auto px-4 pb-12" id="itinerary-content">
        </main>

    <script>
        // Populate Header
        document.getElementById('display-title').innerText = tripData.title;
        document.getElementById('display-dates').innerText = tripData.dates;

        const tabsContainer = document.getElementById('tabs-container');
        const contentContainer = document.getElementById('itinerary-content');

        // Function to find the icon image URL
        function getIconUrl(icon) {
            return `https://raw.githubusercontent.com/twa-space/twemoji/master/twemoji/${icon}.png`;
        }

        // Map simplified icons to specific Twemoji codes
        const emojiMap = {
            'plane': '2708-fe0f', // Airplane
            'bus': '1f68c',       // Bus
            'camera': '1f4f7',    // Camera
            'soccer': '26bd',      // Soccer Ball
            'sunrise': '1f305',   // Sunrise
            'mountain': '1f3d4',  // Mountain
            'palace': '1f3f0',    // Palace/Castle
            'forest': '1f332',    // Evergreeen Tree
            'lake': '1f3de',      // National Park (Lake)
            'boat': '1f6a3',      // Rowboat
            'castle': '1f3ef',    // Japanese Castle (Neuschwanstein substitute)
            'water': '1f6cf',     // Waterfall/water
            'park': '1f333',      // Deciduous Tree
            'beer': '1f37a',      // Beer Mug
            'city': '1f306'       // Cityscape at dusk
        };

        // Create the buttons for each day
        function renderTabs() {
            tabsContainer.innerHTML = tripData.days.map((day, index) => `
                <button onclick="showDay(${index})" 
                        id="tab-${index}"
                        class="px-6 py-3 rounded-full whitespace-nowrap font-bold text-sm shadow transition-all duration-300 transform flex items-center space-x-2 focus:outline-none">
                    <img src="${getIconUrl(emojiMap[day.icon])}" alt="${day.tabName}" class="w-5 h-5 opacity-70">
                    <span>${day.tabName}</span>
                </button>
            `).join('');
        }

        // Show the schedule when a tab is clicked
        function showDay(dayIndex) {
            // Update button colors for active/inactive state
            tripData.days.forEach((_, idx) => {
                const tab = document.getElementById(`tab-${idx}`);
                if (idx === dayIndex) {
                    tab.classList.remove('bg-white', 'text-sky-800', 'scale-100');
                    tab.classList.add('bg-orange-500', 'text-white', 'scale-110', 'active-event');
                } else {
                    tab.classList.remove('bg-orange-500', 'text-white', 'scale-110', 'active-event');
                    tab.classList.add('bg-white', 'text-sky-800', 'scale-100');
                }
            });

            // Update the day's events
            const day = tripData.days[dayIndex];
            contentContainer.innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl p-6 border-t-8 border-orange-400 fade-in-slide relative overflow-hidden">
                    <div class="absolute -top-6 -right-6 text-7xl text-orange-100 opacity-60">🏖️</div>
                    <div class="flex items-center space-x-3 border-b-2 border-sky-100 pb-4 mb-6">
                        <img src="${getIconUrl(emojiMap[day.icon])}" alt="${day.country}" class="w-10 h-10">
                        <div>
                            <h2 class="text-2xl font-extrabold text-sky-900">${day.dateText}</h2>
                            <p class="text-sky-600 font-semibold text-sm">Destinations: ${day.country}</p>
                        </div>
                    </div>
                    <ul class="space-y-6 relative">
                        <div class="absolute left-6 top-3 bottom-0 w-1 bg-sky-100 rounded-full"></div>
                        ${day.events.map(event => `
                            <li class="flex items-start active-event relative pl-12">
                                <div class="absolute left-4 top-1 w-5 h-5 bg-orange-500 rounded-full border-4 border-white shadow"></div>
                                
                                <span class="bg-sky-600 text-white text-xs font-bold px-3 py-1 rounded w-20 text-center shrink-0 mt-0.5 shadow-sm">${event.time}</span>
                                <div class="ml-5">
                                    <p class="font-extrabold text-sky-900 text-lg leading-tight">${event.title}</p>
                                    <p class="text-sm text-sky-700 mt-1 font-medium">${event.desc}</p>
                                </div>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        // Start the app!
        renderTabs();

        // 🧠 Smart Feature: Automatically show the correct day during the trip
        const startDate = new Date("2026-05-06");
        const today = new Date();
        const differenceInTime = today.getTime() - startDate.getTime();
        const differenceInDays = Math.floor(differenceInTime / (1000 * 3600 * 24));

        if (differenceInDays >= 0 && differenceInDays < tripData.days.length) {
            // It's trip time! Show the current day.
            showDay(differenceInDays);
            // Auto-scroll the tab bar to the current day
            document.getElementById(`tab-${differenceInDays}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        } else if (today.getTime() > new Date(startDate.getTime() + (tripData.days.length * 24 * 60 * 60 * 1000)).getTime()) {
            // Trip is over, show the last day (Departure).
            showDay(tripData.days.length - 1);
            tabsContainer.scrollLeft = tabsContainer.scrollWidth; // Scroll to the end
        } else {
            // Trip hasn't started yet, show Day 1.
            showDay(0);
        }

    </script>
</body>
</html>
