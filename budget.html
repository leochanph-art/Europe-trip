<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Europe 2026 - Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-slide-up { animation: fadeSlideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <header class="bg-white px-6 pt-12 pb-4 shrink-0 border-b border-slate-200 z-50 sticky top-0">
        <a href="index.html" class="text-emerald-600 font-bold text-sm flex items-center gap-1 mb-3 hover:text-emerald-700 transition">
            <span>←</span> Back to Itinerary
        </a>
        <div class="flex justify-between items-end">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Trip Ledger</h1>
            <span class="text-3xl">💰</span>
        </div>
    </header>

    <main class="flex-grow px-4 py-6 w-full max-w-md mx-auto pb-32">
        
        <div class="fade-slide-up" id="dashboard-container">
            </div>

        <form id="budget-form" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 mb-6 fade-slide-up" style="animation-delay: 0.1s;">
            <div class="grid grid-cols-2 gap-3 mb-3">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Who Paid?</label>
                    <select id="b-payee" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="Leo">Leo</option>
                        <option value="Wien">Wien</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Method</label>
                    <select id="b-method" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="Card 💳">Card 💳</option>
                        <option value="Cash 💵">Cash 💵</option>
                        <option value="Pay in person🫰</option>
                        <option value="Apple Pay 📱">Apple Pay 📱</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-3 mb-4">
                <div class="col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Currency</label>
                    <select id="b-currency" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-emerald-500 outline-none">
                        <option value="GBP">GBP (£)</option>
                        <option value="EUR">EUR (€)</option>
                        <option value="CZK">CZK (Kč)</option>
                        <option value="HKD">HKD ($)</option>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Amount</label>
                    <input type="number" step="0.01" id="b-amount" required placeholder="0.00" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
            </div>

            <div class="mb-5">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">For What?</label>
                <input type="text" id="b-item" required placeholder="e.g. Dinner, Train tickets" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm font-bold text-slate-700 mt-1 focus:ring-2 focus:ring-emerald-500 outline-none">
            </div>

            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition shadow-sm">Add Expense</button>
        </form>

        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 overflow-hidden fade-slide-up" style="animation-delay: 0.2s;">
            <table class="w-full text-left">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="py-2 px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wide rounded-l-lg">Item</th>
                        <th class="py-2 px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wide">Paid By</th>
                        <th class="py-2 px-2 text-[10px] font-bold text-slate-400 uppercase tracking-wide text-right">Amount</th>
                        <th class="py-2 pl-2 rounded-r-lg"></th>
                    </tr>
                </thead>
                <tbody id="ledger-body">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        let expenses = JSON.parse(localStorage.getItem('europeTripExpenses')) || [];
        const symbols = { 'GBP': '£', 'EUR': '€', 'CZK': 'Kč', 'HKD': 'HK$' };
        
        // Live Exchange Rates Data (Base: HKD)
        let exchangeRates = null;

        // Fetch Live Rates Automatically
        async function getLiveRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/HKD');
                const data = await res.json();
                exchangeRates = data.rates;
                renderApp(); // Re-render to show HKD conversion once loaded
            } catch (e) {
                console.log("Could not fetch exchange rates.");
            }
        }
        
        getLiveRates();

        // 🛠️ BUG FIX: Robust Event Listener to prevent page reload
        document.getElementById('budget-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Stops the page from refreshing
            
            const payee = document.getElementById('b-payee').value;
            const method = document.getElementById('b-method').value;
            const currency = document.getElementById('b-currency').value;
            const amount = parseFloat(document.getElementById('b-amount').value);
            const item = document.getElementById('b-item').value;

            if (!amount || !item) return;

            expenses.push({ id: Date.now(), payee, method, amount, currency, item });
            localStorage.setItem('europeTripExpenses', JSON.stringify(expenses));
            
            // Clear inputs
            document.getElementById('b-amount').value = '';
            document.getElementById('b-item').value = '';
            
            renderApp();
        });

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('europeTripExpenses', JSON.stringify(expenses));
            renderApp();
        }

        function formatTotals(totalsObj) {
            const parts = [];
            for (const [curr, amt] of Object.entries(totalsObj)) {
                if (amt > 0) parts.push(`<div class="font-bold text-slate-800">${symbols[curr]}${amt.toFixed(2)}</div>`);
            }
            return parts.length > 0 ? parts.join('') : '<div class="font-bold text-slate-400">0.00</div>';
        }

        function renderApp() {
            // 1. Render Ledger Table
            let tableHTML = expenses.map(e => `
                <tr class="border-b border-slate-100 last:border-0">
                    <td class="py-3 px-2">
                        <p class="text-sm font-bold text-slate-800">${e.item}</p>
                        <p class="text-[10px] font-semibold text-slate-400 mt-0.5">${e.method}</p>
                    </td>
                    <td class="py-3 px-2 text-xs font-bold ${e.payee === 'Leo' ? 'text-blue-500' : 'text-purple-500'}">${e.payee}</td>
                    <td class="py-3 px-2 text-sm font-bold text-emerald-600 text-right">${symbols[e.currency]}${e.amount.toFixed(2)}</td>
                    <td class="py-3 pl-2 text-right"><button onclick="deleteExpense(${e.id})" class="text-slate-300 hover:text-red-500 font-bold text-lg leading-none transition">×</button></td>
                </tr>
            `).join('');

            if(expenses.length === 0) tableHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-400 text-sm font-medium">No expenses recorded yet!</td></tr>`;
            document.getElementById('ledger-body').innerHTML = tableHTML;

            // 2. Calculate Totals
            const totals = { Leo: {}, Wien: {}, Grand: {} };
            let grandTotalHKD = 0;
            
            expenses.forEach(e => {
                if (!totals[e.payee][e.currency]) totals[e.payee][e.currency] = 0;
                if (!totals.Grand[e.currency]) totals.Grand[e.currency] = 0;
                
                totals[e.payee][e.currency] += e.amount;
                totals.Grand[e.currency] += e.amount;

                // Live HKD Conversion Logic
                if (exchangeRates) {
                    // exchangeRates gives how much 1 HKD is in foreign currency.
                    // To get HKD: divide foreign amount by the rate.
                    grandTotalHKD += (e.amount / exchangeRates[e.currency]);
                }
            });

            // 3. Render Dashboard
            let hkdBanner = exchangeRates 
                ? `<div class="mt-3 pt-3 border-t border-emerald-200 flex justify-between items-center">
                     <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Est. Total in HKD (Live Rate)</p>
                     <p class="text-xl font-black text-emerald-700">HK$ ${grandTotalHKD.toFixed(2)}</p>
                   </div>`
                : `<div class="mt-3 pt-3 border-t border-emerald-200"><p class="text-[10px] text-emerald-600 italic">Fetching live exchange rates...</p></div>`;

            document.getElementById('dashboard-container').innerHTML = `
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 shadow-sm">
                        <p class="text-[10px] font-bold text-blue-500 uppercase tracking-wide mb-1">Leo's Total</p>
                        ${formatTotals(totals.Leo)}
                    </div>
                    <div class="bg-purple-50 border border-purple-100 rounded-2xl p-4 shadow-sm">
                        <p class="text-[10px] font-bold text-purple-500 uppercase tracking-wide mb-1">Wien's Total</p>
                        ${formatTotals(totals.Wien)}
                    </div>
                </div>
                <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-5 shadow-sm mb-6">
                    <p class="text-[11px] font-bold text-emerald-500 uppercase tracking-wide mb-2">Original Currencies Spent</p>
                    <div class="flex flex-wrap gap-x-6 gap-y-2">
                        ${formatTotals(totals.Grand)}
                    </div>
                    ${hkdBanner}
                </div>
            `;
        }

        renderApp(); // Initialize on load
    </script>
</body>
</html>
